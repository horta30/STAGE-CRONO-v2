<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Resultados — Crono System</title>
<meta property="og:title" content="Resultados · Crono System">
<meta property="og:description" content="Leaderboard oficial — Stage 1, Stage 2 y Campeonato">
<meta property="og:image" content="./og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="./og-image.png">
<meta name="theme-color" content="#080808">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--dark:#111;--dark2:#1a1a1a;--border:#1e1e1e;
  --green:#00ff41;--green-dim:rgba(0,255,65,.08);
  --orange:#ff6b00;--yellow:#ffd600;
  --white:#e8e8e8;--grey:#444;--grey2:#2a2a2a;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);color:var(--white);font-family:'Barlow Condensed',sans-serif;}
body{min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:40px;}

/* HEADER */
#header{padding:20px 16px 0;border-bottom:1px solid var(--border);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.06em;color:var(--white);}
.hdr-logo span{color:var(--green);}
.hdr-live{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--grey);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* TABS */
#tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--grey);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--green);border-bottom-color:var(--green);}

/* FILTER BAR */
#filter-bar{padding:12px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);}
#search-input{flex:1;background:var(--dark2);border:1px solid var(--border);color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:15px;padding:8px 12px;outline:none;border-radius:2px;}
#search-input::placeholder{color:var(--grey);}
#search-input:focus{border-color:rgba(0,255,65,.3);}
.filter-count{font-size:11px;color:var(--grey);white-space:nowrap;letter-spacing:.05em;}

/* LEADERBOARD */
#board{padding:0 16px;}
.board-empty{text-align:center;padding:60px 20px;color:var(--grey);font-size:14px;letter-spacing:.1em;}
.board-empty .ico{font-size:40px;margin-bottom:12px;}

/* ROW */
.rider-row{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);gap:12px;cursor:pointer;transition:background .15s;}
.rider-row:last-child{border-bottom:none;}
.rider-row:active{background:var(--green-dim);}

.pos{font-family:'Bebas Neue',sans-serif;font-size:26px;width:36px;text-align:center;flex-shrink:0;line-height:1;}
.pos.gold{color:var(--yellow);}
.pos.silver{color:#aaa;}
.pos.bronze{color:#cd7f32;}
.pos.rest{color:var(--grey);}

.rider-info{flex:1;min-width:0;}
.rider-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rider-meta{font-size:11px;color:var(--grey);letter-spacing:.08em;margin-top:1px;}

.rider-times{text-align:right;flex-shrink:0;}
.time-main{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.02em;line-height:1;}
.time-main.gold{color:var(--yellow);}
.time-main.normal{color:var(--green);}
.time-sub{font-size:10px;color:var(--grey);margin-top:2px;letter-spacing:.05em;}

/* PODIUM — top 3 especial */
.podium-row{background:var(--dark);border-radius:4px;margin-bottom:4px;padding:16px 12px;display:flex;align-items:center;gap:12px;}
.podium-row.p1{border-left:3px solid var(--yellow);}
.podium-row.p2{border-left:3px solid #aaa;}
.podium-row.p3{border-left:3px solid #cd7f32;}

/* SPLITS DETAIL */
.splits-detail{display:none;background:var(--dark);border-radius:3px;margin:-4px 0 8px 48px;padding:10px 12px;border-left:2px solid var(--border);}
.splits-detail.show{display:block;}
.split-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
.split-row:last-child{border-bottom:none;}
.split-name{color:var(--grey);letter-spacing:.08em;text-transform:uppercase;}
.split-lap{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--green);}
.split-accum{font-size:10px;color:var(--grey);}

/* CAMPEONATO badges */
.badge-s1{font-size:9px;letter-spacing:.1em;background:rgba(0,255,65,.1);color:var(--green);border:1px solid rgba(0,255,65,.2);padding:2px 6px;border-radius:2px;display:inline-block;}
.badge-s2{font-size:9px;letter-spacing:.1em;background:rgba(255,107,0,.1);color:var(--orange);border:1px solid rgba(255,107,0,.2);padding:2px 6px;border-radius:2px;display:inline-block;}

/* SHARE BTN */
#share-btn{position:fixed;bottom:20px;right:16px;background:var(--green);color:#000;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.15em;padding:12px 20px;border:none;cursor:pointer;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));z-index:100;}

/* LOADING */
#loading{text-align:center;padding:60px 20px;color:var(--grey);}
.loading-dots{display:inline-flex;gap:6px;}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--green);animation:ldot .8s infinite;}
.loading-dots span:nth-child(2){animation-delay:.15s;}
.loading-dots span:nth-child(3){animation-delay:.3s;}
@keyframes ldot{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

/* LAST UPDATE */
#last-update{text-align:center;padding:16px;font-size:10px;color:var(--grey);letter-spacing:.1em;}
</style>
</head>
<body>

<div id="header">
  <div class="hdr-top">
    <div class="hdr-logo">CRONO<span>SYSTEM</span></div>
    <div class="hdr-live"><div class="live-dot"></div>EN VIVO</div>
  </div>
  <div id="tabs">
    <div class="tab active" data-tab="camp" onclick="switchTab(this)">🏆 Campeonato</div>
    <div class="tab" data-tab="s1" onclick="switchTab(this)">Stage 1</div>
    <div class="tab" data-tab="s2" onclick="switchTab(this)">Stage 2</div>
    <div class="tab" data-tab="s3" onclick="switchTab(this)">Stage 3</div>
  </div>
</div>

<div id="filter-bar">
  <input id="search-input" type="text" placeholder="Buscar rider..." oninput="filterBoard()">
  <span class="filter-count" id="filter-count"></span>
</div>

<div id="loading">
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<div id="board" style="display:none"></div>
<div id="last-update"></div>
<button id="share-btn" onclick="shareLeaderboard()">📤 COMPARTIR</button>

<script>
const SUPA_URL = 'https://lpwokaekgyuiykmllnkj.supabase.co';
const SUPA_KEY = 'sb_publishable_S6fN0jJCTVe-Px8jOMkXaA_nWIq2Yl7';

let currentTab = 'camp';
let allData = { camp: [], s1: [], s2: [], s3: [] };
let filtered = [];

// ── FORMAT ──
function fmt(ms){
  if(!ms) return '--:--.--';
  const s=Math.floor(ms/1000),m=Math.floor(s/60),ss=s%60,t=Math.floor((ms%1000)/100);
  return`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}.${t}`;
}
function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('es-CL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

// ── FETCH ──
async function fetchData(){
  try{
    // Campeonato
    const rCamp = await fetch(`${SUPA_URL}/rest/v1/campeonato?order=tiempo_total.asc`,{
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}
    });
    allData.camp = await rCamp.json();

    // Stage 1
    const rS1 = await fetch(`${SUPA_URL}/rest/v1/mejores_tiempos?stage=eq.1&order=tiempo_ms.asc`,{
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}
    });
    allData.s1 = await rS1.json();

    // Stage 2
    const rS2 = await fetch(`${SUPA_URL}/rest/v1/mejores_tiempos?stage=eq.2&order=tiempo_ms.asc`,{
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}
    });
    allData.s2 = await rS2.json();

    const rS3 = await fetch(`${SUPA_URL}/rest/v1/mejores_tiempos?stage=eq.3&order=tiempo_ms.asc`,{
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}
    });
    allData.s3 = await rS3.json();

    document.getElementById('loading').style.display='none';
    document.getElementById('board').style.display='block';
    document.getElementById('last-update').textContent=`Actualizado: ${new Date().toLocaleTimeString('es-CL')}`;
    renderBoard();
  } catch(e){
    document.getElementById('loading').innerHTML=`<div class="board-empty"><div class="ico">⚠️</div>Error cargando datos</div>`;
  }
}

// ── TABS ──
function switchTab(el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentTab=el.dataset.tab;
  document.getElementById('search-input').value='';
  renderBoard();
}

// ── RENDER ──
function renderBoard(){
  const data = allData[currentTab] || [];
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  filtered = q ? data.filter(r=>(r.nombre||'').toLowerCase().includes(q)) : data;
  document.getElementById('filter-count').textContent=`${filtered.length} rider${filtered.length!==1?'s':''}`;

  const board=document.getElementById('board');
  if(filtered.length===0){
    board.innerHTML=`<div class="board-empty"><div class="ico">🏁</div>Sin resultados aún.<br>¡Sé el primero en completar!</div>`;
    return;
  }

  board.innerHTML='';
  filtered.forEach((r,i)=>{
    const pos=i+1;
    const posClass=pos===1?'gold':pos===2?'silver':pos===3?'bronze':'rest';
    const isPodium=pos<=3;
    const timeClass=pos===1?'gold':'normal';

    if(currentTab==='camp'){
      renderCampRow(board,r,pos,posClass,isPodium,timeClass);
    } else {
      renderStageRow(board,r,pos,posClass,isPodium,timeClass);
    }
  });
}

function renderCampRow(board,r,pos,posClass,isPodium,timeClass){
  const div=document.createElement('div');
  div.className=isPodium?`podium-row p${pos}`:'rider-row';
  div.innerHTML=`
    <div class="pos ${posClass}">${pos}</div>
    <div class="rider-info">
      <div class="rider-name">${r.nombre||'Anónimo'}</div>
      <div class="rider-meta">
        <span class="badge-s1">S1 ${fmt(r.tiempo_stage1)}</span>&nbsp;
        <span class="badge-s2">S2 ${fmt(r.tiempo_stage2)}</span>&nbsp;
        <span class="badge-s3" style="font-size:9px;letter-spacing:.1em;background:rgba(255,214,0,.1);color:var(--yellow);border:1px solid rgba(255,214,0,.2);padding:2px 6px;border-radius:2px;display:inline-block;">S3 ${fmt(r.tiempo_stage3)}</span>
      </div>
    </div>
    <div class="rider-times">
      <div class="time-main ${timeClass}">${fmt(r.tiempo_total)}</div>
      <div class="time-sub">${fmtDate(r.fecha)}</div>
    </div>`;
  board.appendChild(div);
}

function renderStageRow(board,r,pos,posClass,isPodium,timeClass){
  const id=`splits-${pos}`;
  const div=document.createElement('div');
  div.className=isPodium?`podium-row p${pos}`:'rider-row';
  div.onclick=()=>toggleSplits(id);
  div.innerHTML=`
    <div class="pos ${posClass}">${pos}</div>
    <div class="rider-info">
      <div class="rider-name">${r.nombre||'Anónimo'}</div>
      <div class="rider-meta">${fmtDate(r.fecha)}</div>
    </div>
    <div class="rider-times">
      <div class="time-main ${timeClass}">${fmt(r.tiempo_ms)}</div>
      <div class="time-sub">ver splits ↓</div>
    </div>`;
  board.appendChild(div);

  // Splits detail
  const splits=r.splits||[];
  if(splits.length>0){
    const detail=document.createElement('div');
    detail.className='splits-detail';
    detail.id=id;
    splits.forEach((s,si)=>{
      const isLast=si===splits.length-1;
      detail.innerHTML+=`<div class="split-row">
        <span class="split-name">${isLast?'Llegada':'Parcial '+(si+1)}</span>
        <div style="text-align:right">
          <div class="split-lap">${fmt(s.lap)}</div>
          <div class="split-accum">acum ${fmt(s.elapsed)}</div>
        </div>
      </div>`;
    });
    board.appendChild(detail);
  }
}

function toggleSplits(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('show');
}

function filterBoard(){ renderBoard(); }

// ── SHARE ──
function shareLeaderboard(){
  const tabNames={camp:'Campeonato',s1:'Stage 1',s2:'Stage 2',s3:'Stage 3'};
  const url=`${window.location.origin}${window.location.pathname}?tab=${currentTab}`;
  const txt=`🏆 Leaderboard ${tabNames[currentTab]} — Crono System\n${url}`;
  if(navigator.share) navigator.share({title:`Crono System · ${tabNames[currentTab]}`,text:txt,url}).catch(()=>{});
  else navigator.clipboard.writeText(url).then(()=>alert('Link copiado'));
}

// ── DEEP LINK ──
const urlTab=new URLSearchParams(window.location.search).get('tab');
if(urlTab && ['camp','s1','s2','s3'].includes(urlTab)){
  currentTab=urlTab;
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.tab===urlTab);
  });
}

// ── AUTO REFRESH cada 30s ──
fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
