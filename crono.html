<style>
:root{
  --bg:#080808;--dark:#111;--dark2:#1a1a1a;--border:#222;
  --green:#00ff41;--green2:#00cc34;--green-dim:#004d14;
  --orange:#ff6b00;--yellow:#ffd600;--red:#ff2222;
  --white:#e8e8e8;--grey:#555;--grey2:#333;
  --accent:#00ff41;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{display:flex;flex-direction:column;font-family:'Barlow Condensed',sans-serif;color:var(--white);}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:2000;background:rgba(8,8,8,.95);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;transition:opacity .5s,visibility .5s;}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none;}
#splash-canvas{position:absolute;inset:0;width:100%;height:100%;opacity:.15;pointer-events:none;}
.splash-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;}
.splash-stage-badge{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;border:1px solid rgba(255,255,255,.1);padding:4px 12px;border-radius:2px;}
.splash-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,12vw,80px);line-height:.85;color:var(--white);margin-bottom:4px;}
.splash-logo span{color:var(--accent);}
.splash-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,5vw,26px);color:var(--accent);letter-spacing:.1em;margin-bottom:4px;min-height:30px;}
.splash-sub{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:36px;}
.splash-cta{display:flex;flex-direction:column;align-items:center;width:100%;max-width:300px;}
.splash-btn{background:var(--accent);color:#000;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;padding:16px 0;border:none;cursor:pointer;width:100%;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .2s;}
.splash-btn:disabled{opacity:.5;}
.btn-dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.5);animation:dp 1s infinite;flex-shrink:0;}
@keyframes dp{0%,100%{opacity:.5;}50%{opacity:1;}}
.splash-note{background:rgba(8,8,8,.7);border:1px solid var(--border);border-top:none;padding:10px 16px;width:100%;font-size:10px;letter-spacing:.08em;line-height:1.7;color:rgba(255,255,255,.3);}

/* TOPBAR */
#topbar{flex-shrink:0;background:rgba(8,8,8,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 10px;height:54px;display:flex;align-items:center;gap:8px;z-index:1000;}
#back-btn{background:transparent;border:1px solid var(--border);color:var(--grey);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:5px 8px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;white-space:nowrap;flex-shrink:0;}
#back-btn:hover{border-color:var(--accent);color:var(--accent);}
#chrono-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
#chrono{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,6vw,34px);letter-spacing:.04em;color:var(--grey2);line-height:1;transition:color .3s;}
#chrono.waiting{color:var(--grey);}
#chrono.running{color:var(--accent);text-shadow:0 0 6px rgba(0,255,65,.15);}
#chrono.finished{color:var(--yellow);text-shadow:0 0 12px rgba(255,214,0,.3);}
#chrono-label{font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:var(--grey);text-align:center;}
#gps-btn{background:var(--dark2);color:var(--grey);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:7px 11px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap;flex-shrink:0;}
#gps-btn.active{background:rgba(0,255,65,.06);border-color:rgba(0,255,65,.35);color:rgba(0,255,65,.8);}
#reset-btn{background:rgba(255,34,34,.12);border:1px solid rgba(255,34,34,.4);color:rgba(255,34,34,.8);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:7px 11px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
#reset-btn:active{background:rgba(255,34,34,.25);}
.gps-dot{width:7px;height:7px;border-radius:50%;background:var(--grey2);flex-shrink:0;transition:background .3s;}
.gps-dot.searching{background:var(--yellow);animation:gpsPulse .6s infinite;}
.gps-dot.on{background:rgba(0,255,65,.7);animation:gpsPulse 1.5s infinite;}
@keyframes gpsPulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* SPLITS BAR */
#splits-bar{flex-shrink:0;background:var(--dark);border-bottom:1px solid var(--border);display:flex;height:52px;overflow:hidden;}
.split-col{flex:1;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 2px;transition:background .3s;}
.split-col:last-child{border-right:none;}
.split-col.done{background:rgba(0,255,65,.02);}
.split-col.next{background:rgba(255,107,0,.03);}
.split-col.finish.done{background:rgba(255,214,0,.03);}
.sc-name{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.sc-time{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--grey2);line-height:1;transition:color .3s;}
.split-col.done .sc-time{color:var(--green);}
.split-col.next .sc-name{color:var(--orange);}
.split-col.next .sc-time{color:var(--orange);font-size:14px;}
.split-col.finish.done .sc-time{color:var(--yellow);}

/* MAP */
#map{flex:1;position:relative;overflow:hidden;}
#leaflet-map{position:absolute;width:160%;height:160%;top:-30%;left:-30%;transform-origin:center center;}

/* Controls */
.mc{position:absolute;z-index:600;pointer-events:none;}
.mc *{pointer-events:all;}
#zoom-ctrl{top:12px;right:12px;display:flex;flex-direction:column;gap:4px;}
.zbtn{width:36px;height:36px;background:rgba(8,8,8,.9);backdrop-filter:blur(6px);border:1px solid var(--border);color:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#compass{position:absolute;top:12px;left:12px;z-index:600;width:42px;height:42px;background:rgba(8,8,8,.9);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#compass-needle{transition:transform .25s ease;}
#waze-ctrl{bottom:128px;right:12px;}
#waze-btn{background:rgba(8,8,8,.9);backdrop-filter:blur(6px);border:1px solid var(--border);color:var(--grey);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:8px 11px;cursor:pointer;display:flex;align-items:center;gap:5px;}
#waze-btn.on{border-color:rgba(255,107,0,.45);color:rgba(255,107,0,.75);}
#follow-ctrl{bottom:92px;right:12px;}
#follow-btn{background:rgba(8,8,8,.9);backdrop-filter:blur(6px);border:1px solid var(--border);color:var(--grey);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:8px 11px;cursor:pointer;display:flex;align-items:center;gap:6px;}
#follow-btn.on{border-color:rgba(0,255,65,.35);color:rgba(0,255,65,.7);}
#audio-ctrl{bottom:56px;right:12px;}
#audio-btn{background:rgba(8,8,8,.9);backdrop-filter:blur(6px);border:1px solid var(--border);color:var(--grey);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:8px 11px;cursor:pointer;display:flex;align-items:center;gap:5px;}
#audio-btn.on{border-color:rgba(0,255,65,.35);color:rgba(0,255,65,.7);}
#style-ctrl{bottom:20px;left:12px;}
.style-row{display:flex;gap:4px;}
.sbtn{background:rgba(8,8,8,.9);backdrop-filter:blur(6px);border:1px solid var(--border);color:var(--grey);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:7px 10px;cursor:pointer;}
.sbtn.on{border-color:rgba(0,255,65,.4);color:rgba(0,255,65,.75);}
#prox-ring{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(8,8,8,.92);border:1px solid var(--border);border-radius:20px;padding:6px 16px;z-index:500;pointer-events:none;display:none;white-space:nowrap;font-size:11px;letter-spacing:.1em;color:var(--grey);}
#prox-dist{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--orange);}
#prox-dist.close{color:var(--green);}

/* TOAST */
#toast{position:absolute;top:0;left:0;right:0;z-index:800;transform:translateY(-100%);transition:transform .35s cubic-bezier(.16,1,.3,1);pointer-events:none;}
#toast.show{transform:translateY(0);}
.toast-inner{margin:8px 12px;background:var(--dark2);border:1px solid rgba(0,255,65,.4);border-radius:3px;padding:10px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.6);}
.toast-inner.finish{border-color:rgba(255,214,0,.4);}
.toast-icon{font-size:22px;flex-shrink:0;}
.toast-wp{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--grey);}
.toast-time{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.03em;color:var(--green);line-height:1;}
.toast-inner.finish .toast-time{color:var(--yellow);}
.toast-sub{font-size:10px;color:var(--grey);margin-top:1px;}

/* RESULT SCREEN */
#result-screen{display:none;position:fixed;inset:0;z-index:3000;background:var(--bg);flex-direction:column;overflow-y:auto;padding:20px 16px 32px;}
#result-screen.show{display:flex;}
.rs-header{text-align:center;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.rs-stage-tag{font-size:10px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:4px;padding:4px 12px;border-radius:2px;display:inline-block;}
.rs-rider{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.1em;color:var(--accent);margin-bottom:4px;min-height:24px;}
.rs-time{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:3px;color:var(--yellow);line-height:1;text-shadow:0 0 30px rgba(255,214,0,.25);}
.rs-date{font-size:10px;letter-spacing:.12em;color:var(--grey);margin-top:6px;}
.rs-splits{background:var(--dark);border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.rs-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);}
.rs-row:last-child{border-bottom:none;}
.rs-idx{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--grey2);width:26px;flex-shrink:0;}
.rs-info{flex:1;}
.rs-wp-name{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.rs-type{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);margin-top:1px;}
.rs-times{text-align:right;}
.rs-lap{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.02em;color:var(--green);}
.rs-accum{font-size:10px;letter-spacing:.1em;color:var(--grey);margin-top:1px;}
#rs-history{margin-bottom:12px;}
.rs-hist-section{background:var(--dark);border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px;}
.rs-hist-title{padding:8px 14px;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--grey);border-bottom:1px solid var(--border);}
.rs-hist-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);gap:10px;}
.rs-hist-row:last-child{border-bottom:none;}
.rs-hist-num{font-size:11px;color:var(--grey);width:24px;flex-shrink:0;}
.rs-hist-time{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--white);flex:1;}
.rs-hist-badge{font-size:9px;background:rgba(0,255,65,.1);color:var(--green);border:1px solid rgba(0,255,65,.2);padding:2px 6px;border-radius:2px;}
.rs-hist-date{font-size:10px;color:var(--grey);text-align:right;}

/* POST-STAGE NAV */
.rs-share{width:100%;margin-bottom:10px;padding:13px;background:transparent;border:1px solid var(--green-dim);border-radius:2px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.2em;color:var(--green);cursor:pointer;transition:border-color .2s;}
.rs-share:hover{border-color:rgba(0,255,65,.5);}
.rs-actions{display:flex;gap:10px;margin-bottom:10px;}
.rs-btn{flex:1;padding:14px;border:none;border-radius:2px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.15em;cursor:pointer;transition:opacity .2s,transform .1s;}
.rs-btn:active{transform:scale(.97);}
.rs-btn-retry{background:var(--dark2);color:var(--white);border:1px solid var(--border);}
.rs-btn-next{background:var(--accent);color:#000;}
.rs-nav-row{display:flex;gap:8px;}
.rs-nav-btn{flex:1;padding:11px;background:var(--dark);border:1px solid var(--border);color:var(--grey);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;}
.rs-nav-btn:hover{border-color:var(--accent);color:var(--accent);}

/* CAMPEONATO card en result */
.rs-camp-card{background:var(--dark);border:1px solid rgba(255,214,0,.25);border-radius:3px;padding:14px 16px;margin-bottom:12px;text-align:center;}
.rs-camp-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.2em;color:var(--yellow);margin-bottom:4px;}
.rs-camp-time{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--yellow);}
.rs-camp-sub{font-size:10px;color:var(--grey);letter-spacing:.1em;}


/* BRÚJULA INICIO EN TOPBAR */
#inicio-compass{display:none;align-items:center;gap:5px;background:var(--dark2);border:1px solid var(--border);padding:5px 9px;flex-shrink:0;}
#inicio-compass.show{display:flex;}
.ic-label{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--grey);}
#north-compass{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:var(--dark2);border:1px solid var(--border);cursor:pointer;flex-shrink:0;border-radius:50%;}
#north-needle{transition:transform .25s ease;}
#ic-arrow{font-size:16px;display:inline-block;transition:transform .3s ease;line-height:1;}

.leaflet-control-zoom,.leaflet-control-attribution{display:none;}
@keyframes uPulse{0%,100%{transform:scale(1);opacity:.6;}50%{transform:scale(2.4);opacity:0;}}


</style>
</head>
<body>

<div id="splash">
  <canvas id="splash-canvas"></canvas>
  <div class="splash-inner">
    <div class="splash-stage-badge" id="splash-stage-badge">STAGE 1</div>
    <div class="splash-logo">STAGE<br><span id="splash-stage-name">CRONO</span></div>
    <div class="splash-name" id="splash-name"></div>
    <div class="splash-sub" id="splash-zone">Lo Barnechea · Cajón del Arrayán</div>
    <div class="splash-cta">
      <button class="splash-btn" onclick="initGPS()">
        <div class="btn-dot"></div>ACTIVAR GPS
      </button>
      <div class="splash-note">El cronómetro arranca solo al pasar el INICIO. Mantén pantalla activa.</div>
    </div>
  </div>
</div>

<div id="topbar">
  <a href="./index.html" id="back-btn">← HOME</a>
  <div id="inicio-compass"><span class="ic-label">INICIO</span><span id="ic-arrow">↑</span></div>
  <div id="north-compass" onclick="resetNorth()" title="Norte">
    <svg id="north-needle" width="16" height="16" viewBox="0 0 16 16">
      <polygon points="8,1 10,8 8,15 6,8" fill="#00ff41"/>
      <polygon points="8,1 6,8 8,15 10,8" fill="rgba(255,255,255,.15)"/>
      <circle cx="8" cy="8" r="1.5" fill="white"/>
    </svg>
  </div>
  <div id="chrono-wrap">
    <div id="chrono" class="waiting">00:00.0</div>
    <div id="chrono-label">En espera</div>
  </div>
  <button id="reset-btn" onclick="cancelRun()" style="display:none">↺ REINICIAR</button>
  <button id="gps-btn" onclick="toggleGPS()">
    <div class="gps-dot" id="gps-dot"></div>
    <span id="gps-label">GPS</span>
  </button>
</div>

<div id="splits-bar"></div>

<div id="map">
  <div id="leaflet-map"></div>
  <div id="toast">
    <div class="toast-inner" id="toast-inner">
      <div class="toast-icon" id="toast-icon">⏱</div>
      <div><div class="toast-wp" id="toast-wp"></div><div class="toast-time" id="toast-time"></div><div class="toast-sub" id="toast-sub"></div></div>
    </div>
  </div>
  <div id="prox-ring">📍 <span id="prox-dist">---</span><span style="font-size:9px;margin-left:2px">m</span></div>
  <div id="compass" onclick="resetNorth()">
    <svg id="compass-needle" width="22" height="22" viewBox="0 0 22 22">
      <polygon points="11,2 13.5,11 11,20 8.5,11" fill="#00ff41"/>
      <polygon points="11,2 8.5,11 11,20 13.5,11" fill="rgba(255,255,255,.12)"/>
      <circle cx="11" cy="11" r="2" fill="white"/>
    </svg>
  </div>
  <div class="mc" id="zoom-ctrl">
    <button class="zbtn" onclick="lmap.zoomIn()">+</button>
    <button class="zbtn" onclick="lmap.zoomOut()">−</button>
  </div>
  <div class="mc" id="waze-ctrl"><button id="waze-btn" class="on" onclick="toggleWaze()">🧭 Waze</button></div>
  <div class="mc" id="follow-ctrl"><button id="follow-btn" class="on" onclick="toggleFollow()">⊙ Siguiendo</button></div>
  <div class="mc" id="audio-ctrl"><button id="audio-btn" class="on" onclick="toggleAudio()">🔊 Audio</button></div>
  <div class="mc" id="style-ctrl">
    <div class="style-row">
      <button class="sbtn on" data-l="topo" onclick="setStyle(this)">Topo</button>
      <button class="sbtn" data-l="satellite" onclick="setStyle(this)">Sat</button>
      <button class="sbtn" data-l="osm" onclick="setStyle(this)">OSM</button>
    </div>
  </div>
</div>

<div id="result-screen">
  <div class="rs-header">
    <div class="rs-stage-tag" id="rs-stage-tag"></div>
    <div class="rs-rider" id="rs-rider"></div>
    <div class="rs-time" id="rs-time">00:00.0</div>
    <div class="rs-date" id="rs-date"></div>
  </div>
  <div class="rs-splits" id="rs-splits"></div>
  <div id="rs-camp-block"></div>
  <div id="rs-history"></div>
  <div id="rs-actions-block"></div>
</div>

<script>
'use strict';

// ── INIT DESDE SESSION ──
const _nombre = GravitasSession.getPilot() || '';
const _accentColor = CT.meta.color || '#00ff41';

// Actualizar CSS accent
document.documentElement.style.setProperty('--accent', _accentColor);

// Splash UI
document.getElementById('splash-stage-badge').textContent = `STAGE ${CT.meta.stage}`;
document.getElementById('splash-stage-name').textContent = CT.meta.nombre.toUpperCase();
if (_nombre) document.getElementById('splash-name').textContent = _nombre.toUpperCase();
document.getElementById('splash-zone').textContent = CT.meta.zona;
document.getElementById('rs-rider').textContent = _nombre ? _nombre.toUpperCase() : 'PILOTO';

// Stage tag styling
const stageTag = document.getElementById('rs-stage-tag');

// ── HAVERSINE (hoisted for nav screen) ──
function distM(la1, lo1, la2, lo2) {
  const R = 6371000, dLa = (la2 - la1) * Math.PI / 180, dLo = (lo2 - lo1) * Math.PI / 180;
  const a = Math.sin(dLa / 2) ** 2 + Math.cos(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.sin(dLo / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

let gpsActive = false, gpsWatch = null, lastBearing = 0, firstFix = true;

    document.getElementById('gps-btn').classList.remove('active');

function onPos(pos) {
  const { latitude: lat, longitude: lon, accuracy: acc, heading: hdg } = pos.coords;
  document.getElementById('gps-dot').className = 'gps-dot on';
  document.getElementById('gps-btn').classList.add('active');
  document.getElementById('gps-label').textContent = `±${Math.round(acc)}m`;

  if (firstFix) {
    firstFix = false;
    document.getElementById('splash').classList.add('hidden');
    S.phase = 'waiting';
    document.getElementById('chrono-label').textContent = 'Dirígete al INICIO';
    lmap.setView([lat, lon], 16);
    const msg = _nombre
      ? `Atención ${_nombre}. Cronómetro activa al pasar el inicio. Pasa en movimiento.`
      : 'Atención. Cronómetro activa al pasar el inicio. Pasa en movimiento.';
    setTimeout(() => speak(msg, true), 700);
  }

  if (!userMarker) userMarker = L.marker([lat, lon], { icon: makeUserIcon(), zIndexOffset: 1000 }).addTo(lmap);
  else userMarker.setLatLng([lat, lon]);

  if (hdg !== null && hdg !== undefined && !isNaN(hdg)) lastBearing = hdg;
  if (wazeMode) applyBearing(lastBearing);
  else document.getElementById('compass-needle').style.transform = `rotate(${lastBearing}deg)`;
  if (followMode) lmap.panTo([lat, lon], { animate: true, duration: .25, easeLinearity: 1 });

  // Brújula hacia el inicio (solo en fase waiting)
  if (S.phase === 'waiting' || S.phase === 'init') {
    const compass = document.getElementById('inicio-compass');
    compass.classList.add('show');
    const b = bearingTo(lat, lon, CT.waypoints[0].lat, CT.waypoints[0].lon);
    const rel = ((b - lastBearing) + 360) % 360;
    document.getElementById('ic-arrow').style.transform = `rotate(${rel}deg)`;
  } else {
    document.getElementById('inicio-compass').classList.remove('show');
  }


  if (S.phase === 'running') {
    const now = Date.now();
    if (!gpsTrack._last || now - gpsTrack._last > 5000) {
      gpsTrack.push({ lat, lon, t: now }); gpsTrack._last = now;
    }
  }

  let minD = Infinity, minI = 0;
  CT.track.forEach(([la, lo], i) => { const d = Math.hypot(lat - la, lon - lo); if (d < minD) { minD = d; minI = i; } });
  if (minI > 1) doneLine.setLatLngs(CT.track.slice(0, minI + 1));

  if (S.phase === 'waiting' || S.phase === 'running') processPos(lat, lon);
}

// ── BEARING TO POINT ──
function bearingTo(lat1, lon1, lat2, lon2) {
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
  const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
             Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
  return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

// ── FORMAT ──
function fmt(ms) { const s = Math.floor(ms / 1000), m = Math.floor(s / 60), ss = s % 60, t = Math.floor((ms % 1000) / 100); return `${String(m).padStart(2, '0')}:${String(ss).padStart(2, '0')}.${t}`; }
function fmtS(ms) { const s = Math.floor(ms / 1000), m = Math.floor(s / 60), ss = s % 60, t = Math.floor((ms % 1000) / 100); return `${m}:${String(ss).padStart(2, '0')}.${t}`; }
function fmtVoz(ms) { const s = Math.floor(ms / 1000), m = Math.floor(s / 60), ss = s % 60; if (m > 0 && ss > 0) return `${m} minuto${m > 1 ? 's' : ''} con ${ss} segundo${ss !== 1 ? 's' : ''}`; if (m > 0) return `${m} minuto${m > 1 ? 's' : ''}`; return `${ss} segundo${ss !== 1 ? 's' : ''}`; }

// ── SUPABASE / OFFLINE ──
const SESSION_ID = crypto.randomUUID();
let gpsTrack = [];
let gpsInicio = null, gpsFin = null;
const OFFLINE_KEY = 'crono_pending_results';

function guardarLocal(payload) {
  const pending = JSON.parse(localStorage.getItem(OFFLINE_KEY) || '[]');
  pending.push(payload); localStorage.setItem(OFFLINE_KEY, JSON.stringify(pending));
}
async function sincronizarPendientes() {
  const pending = JSON.parse(localStorage.getItem(OFFLINE_KEY) || '[]');
  if (pending.length === 0) return;
  const enviados = [];
  for (const payload of pending) {
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/resultados`, { method: 'POST', headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }, body: JSON.stringify(payload) });
      if (r.ok) enviados.push(payload.session_id);
    } catch (e) {}
  }
  if (enviados.length > 0) {
    const restantes = pending.filter(p => !enviados.includes(p.session_id));
    localStorage.setItem(OFFLINE_KEY, JSON.stringify(restantes));
  }
}
window.addEventListener('online', sincronizarPendientes);
setTimeout(sincronizarPendientes, 3000);

async function guardarResultado(totalMs, splits) {
  const pin = _nombre ? GravitasSession.pin(_nombre) : '0000';
  const payload = {
    session_id: SESSION_ID,
    nombre: _nombre || 'Anónimo',
    pin,
    stage: CT.meta.stage,
    tiempo_ms: totalMs,
    splits: splits.map(s => ({ wpIdx: s.wpIdx, elapsed: s.elapsed, lap: s.lap, name: CT.waypoints[s.wpIdx]?.name || '' })),
    track: gpsTrack.slice(),
    gps_inicio: gpsInicio || Date.now(),
    gps_fin: gpsFin || Date.now(),
    valido: true,
  };
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/resultados`, { method: 'POST', headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }, body: JSON.stringify(payload) });
    if (r.ok) return true;
    guardarLocal(payload); return false;
  } catch (e) { guardarLocal(payload); return false; }
}

// ── SEQ & STATE ──
const SEQ = CT.waypoints.map((_, i) => i); // [0,1,2,...,n]
const S = {
  phase: 'init',
  seqIdx: 0,
  startTime: null,
  splits: [],
  timerInterval: null,
  toastTimeout: null,
  alertDone: false,
  triggered: false,
  history: [],
};

// ── PROCESS POSITION ──
function processPos(lat, lon) {
  if (S.phase === 'finished') return;

  if (S.phase === 'waiting') {
    const wp0 = CT.waypoints[0];
    const d = distM(lat, lon, wp0.lat, wp0.lon);
    if (d <= 300) {
      document.getElementById('prox-ring').style.display = 'block';
      document.getElementById('prox-dist').textContent = Math.round(d);
      document.getElementById('prox-dist').className = d < wp0.radio ? 'close' : '';
    } else { document.getElementById('prox-ring').style.display = 'none'; }
    if (d <= CT.meta.radioAlerta && d > wp0.radio && !S.alertDone) {
      S.alertDone = true;
      speak('Inicio en 100 metros. Prepárate.', true);
      showToast('⚡', 'INICIO EN 100m', '', 'Mantén velocidad', 'normal');
      // Bloquear rotación manual y activar Waze
      lockRotation();
    }
    if (d <= wp0.radio && !S.triggered) { S.triggered = true; triggerStart(); }
    return;
  }

  if (S.phase === 'running') {
    if (S.seqIdx >= SEQ.length) return;
    const wp = CT.waypoints[SEQ[S.seqIdx]];
    const d = distM(lat, lon, wp.lat, wp.lon);
    const r = wp.radio || CT.meta.radio;
    document.getElementById('prox-ring').style.display = 'block';
    document.getElementById('prox-dist').textContent = Math.round(d);
    document.getElementById('prox-dist').className = d < r ? 'close' : '';
    if (d <= r && !S.triggered) {
      S.triggered = true;
      const isLast = (S.seqIdx === SEQ.length - 1);
      if (isLast) triggerFinish(); else triggerSplit();
    }
  }
}

// ── TRIGGERS ──
function triggerStart() {
  S.startTime = Date.now(); S.phase = 'running'; S.seqIdx = 1; S.triggered = false;
  gpsInicio = Date.now(); gpsTrack = [];
  document.getElementById('chrono').className = 'running';
  document.getElementById('chrono-label').textContent = '↑ EN CARRERA';
  markSplitDone(0, '00:00.0'); markSplitNext(1);
  S.timerInterval = setInterval(() => {
    if (S.phase === 'running') document.getElementById('chrono').textContent = fmt(Date.now() - S.startTime);
  }, 100);
  document.getElementById('reset-btn').style.display = 'block';
  const nextWP = CT.waypoints[SEQ[1]];
  showToast('🟢', 'INICIO', '00:00.0', 'Cronómetro iniciado', 'normal');
  speak(_nombre
    ? `${_nombre}, cronómetro iniciado. Primer parcial en ${nextWP.name}.`
    : `Cronómetro iniciado. Primer parcial en ${nextWP.name}.`, true);
}

function triggerSplit() {
  const elapsed = Date.now() - S.startTime;
  const prevE = S.splits.length > 0 ? S.splits[S.splits.length - 1].elapsed : 0;
  const lap = elapsed - prevE;
  const wpIdx = SEQ[S.seqIdx];
  const splitNum = S.splits.length + 1;
  S.splits.push({ wpIdx, elapsed, lap });
  markSplitDone(S.seqIdx, fmtS(lap));
  S.seqIdx++; S.triggered = false;
  markSplitNext(S.seqIdx);
  const wp = CT.waypoints[wpIdx];
  const vozExtra = wp.voz ? ` ${wp.voz}` : '';
  showToast('⏱', `PARCIAL ${splitNum} — ${wp.name}`, fmtS(lap), `Acum: ${fmtS(elapsed)}`, 'normal');
  speak(`Llevas ${fmtVoz(elapsed)}.${vozExtra} Segmento ${fmtVoz(lap)}.`, true);
}

function triggerFinish() {
  const elapsed = Date.now() - S.startTime;
  const prevE = S.splits.length > 0 ? S.splits[S.splits.length - 1].elapsed : 0;
  const lap = elapsed - prevE;
  const wpIdx = SEQ[S.seqIdx];
  gpsFin = Date.now();
  S.splits.push({ wpIdx, elapsed, lap });
  S.phase = 'finished'; clearInterval(S.timerInterval);
  document.getElementById('reset-btn').style.display = 'none';
  S.history.push({ totalMs: elapsed, splits: [...S.splits], date: new Date().toLocaleString('es-CL', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) });
  document.getElementById('chrono').textContent = fmt(elapsed);
  document.getElementById('chrono').className = 'finished';
  document.getElementById('chrono-label').textContent = 'TIEMPO FINAL';
  markSplitDone(SEQ.length - 1, fmtS(elapsed));
  document.getElementById('prox-ring').style.display = 'none';
  document.getElementById('leaflet-map').style.transform = 'rotate(0deg)';
  showToast('🏆', 'LLEGADA', fmt(elapsed), 'Recorrido completado!', 'finish');
  speak(_nombre
    ? `Bien hecho ${_nombre}! Tiempo final: ${fmtVoz(elapsed)}. Recorrido completado.`
    : `Tiempo final: ${fmtVoz(elapsed)}. Recorrido completado.`, true);

  // Guardar en sesión local
  GravitasSession.saveTime(CT.meta.stage, elapsed, S.splits);

  // Guardar en Supabase
  guardarResultado(elapsed, S.splits).then(ok => {
    setTimeout(() => showToast(ok ? '✅' : '⚠️', ok ? 'GUARDADO' : 'SIN CONEXIÓN', '', ok ? 'Tiempo guardado' : 'Guardado local', 'normal'), 4000);
  });

  setTimeout(() => showResult(elapsed), 3500);
}

// ── RESULT SCREEN ──
function showResult(totalMs) {
  document.getElementById('rs-time').textContent = fmt(totalMs);
  document.getElementById('rs-date').textContent = new Date().toLocaleString('es-CL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }).toUpperCase();

  // Splits table
  const cont = document.getElementById('rs-splits'); cont.innerHTML = '';
  const startWP = CT.waypoints[0];
  const r0 = document.createElement('div'); r0.className = 'rs-row';
  r0.innerHTML = `<div class="rs-idx" style="color:var(--green)">S</div><div class="rs-info"><div class="rs-wp-name" style="color:var(--green)">${startWP.name}</div><div class="rs-type">Punto de salida</div></div><div class="rs-times"><div class="rs-lap" style="color:var(--green)">00:00.0</div><div class="rs-accum">acum: 00:00.0</div></div>`;
  cont.appendChild(r0);
  S.splits.forEach((s, i) => {
    const wp = CT.waypoints[s.wpIdx];
    const isLast = i === S.splits.length - 1;
    const row = document.createElement('div'); row.className = 'rs-row';
    row.innerHTML = `<div class="rs-idx" style="color:${isLast ? 'var(--yellow)' : 'var(--orange)'}">${isLast ? 'F' : i + 1}</div><div class="rs-info"><div class="rs-wp-name" style="color:${isLast ? 'var(--yellow)' : 'var(--white)'}">${wp.name}</div><div class="rs-type">${isLast ? 'Llegada' : 'Parcial ' + (i + 1)}</div></div><div class="rs-times"><div class="rs-lap" style="color:${isLast ? 'var(--yellow)' : 'var(--green)'}">${fmtS(s.lap)}</div><div class="rs-accum">acum: ${fmtS(s.elapsed)}</div></div>`;
    cont.appendChild(row);
  });

  // Historia de sesión
  const histCont = document.getElementById('rs-history'); histCont.innerHTML = '';
  if (S.history.length > 1) {
    const sec = document.createElement('div'); sec.className = 'rs-hist-section';
    sec.innerHTML = `<div class="rs-hist-title">STAGE ${CT.meta.stage} · ${CT.meta.nombre} — ${S.history.length} intentos</div>`;
    S.history.forEach((r, i) => {
      const isBest = r.totalMs === Math.min(...S.history.map(h => h.totalMs));
      const row = document.createElement('div'); row.className = 'rs-hist-row';
      row.innerHTML = `<span class="rs-hist-num">#${i + 1}</span><span class="rs-hist-time">${fmt(r.totalMs)}</span>${isBest ? '<span class="rs-hist-badge">MEJOR</span>' : ''}<span class="rs-hist-date">${r.date}</span>`;
      sec.appendChild(row);
    }); histCont.appendChild(sec);
  }

  // Bloque campeonato si S1 y S2 completados
  const campBlock = document.getElementById('rs-camp-block'); campBlock.innerHTML = '';
  const total = GravitasSession.getTotal();
  if (total) {
    const t1 = GravitasSession.getTime(1);
    const t2 = GravitasSession.getTime(2);
    campBlock.innerHTML = `<div class="rs-camp-card"><div class="rs-camp-title">🏆 CAMPEONATO COMPLETO</div><div class="rs-camp-time">${fmt(total)}</div><div class="rs-camp-sub" style="margin-top:4px">S1 ${fmt(t1.ms)} + S2 ${fmt(t2.ms)}</div></div>`;
  }

  // Botones de navegación post-especial
  const MAX_SEGS = 3;
  const nextSeg = CT.meta.stage + 1;
  const hasNext = nextSeg <= MAX_SEGS;
  const actionsBlock = document.getElementById('rs-actions-block');
  actionsBlock.innerHTML = `
    <button class="rs-share" onclick="shareResult()">📤 COMPARTIR POR WHATSAPP</button>
    <div class="rs-actions">
      <button class="rs-btn rs-btn-retry" onclick="resetSession()">🔁 REINTENTAR</button>
      <button class="rs-btn rs-btn-next" style="background:${hasNext ? 'var(--orange)' : 'var(--yellow)'}; color:#000;" onclick="${hasNext ? `goStage(${nextSeg})` : 'goHome()'}">
        ${hasNext ? `➡️ STAGE ${nextSeg}` : '🏆 CAMPEONATO'}
      </button>
    </div>
    <div class="rs-nav-row">
      <button class="rs-nav-btn" onclick="goLeaderboard()">🏆 Leaderboard</button>
      <button class="rs-nav-btn" onclick="goHome()">🏠 Home</button>
    </div>`;

  document.getElementById('result-screen').classList.add('show');
}

// ── NAVEGACIÓN POST-ESPECIAL ──
window.goStage = function (n) { window.location.href = `./crono.html?seg=${n}`; };
window.goHome = function () { window.location.href = './index.html'; };
window.goLeaderboard = function () { window.location.href = './resultados.html'; };

// ── RESET SESSION (preserva history) ──
window.resetSession = function () {
  unlockRotation();
  clearInterval(S.timerInterval);
  const hist = S.history;
  Object.assign(S, { phase: 'waiting', seqIdx: 0, startTime: null, splits: [], timerInterval: null, toastTimeout: null, alertDone: false, triggered: false });
  S.history = hist;
  document.getElementById('chrono').textContent = '00:00.0';
  document.getElementById('chrono').className = 'waiting';
  document.getElementById('chrono-label').textContent = 'Dirígete al INICIO';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('toast').classList.remove('show');
  document.querySelectorAll('.split-col').forEach(el => { el.classList.remove('done', 'next'); el.querySelector('.sc-time').textContent = '-:--'; });
};

// ── CANCEL RUN ──
window.cancelRun = function () {
  unlockRotation();
  clearInterval(S.timerInterval);
  const hist = S.history;
  Object.assign(S, { phase: 'waiting', seqIdx: 0, startTime: null, splits: [], timerInterval: null, toastTimeout: null, alertDone: false, triggered: false });
  S.history = hist;
  document.getElementById('chrono').textContent = '00:00.0';
  document.getElementById('chrono').className = 'waiting';
  document.getElementById('chrono-label').textContent = 'Dirígete al INICIO';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('toast').classList.remove('show');
  document.querySelectorAll('.split-col').forEach(el => { el.classList.remove('done', 'next'); el.querySelector('.sc-time').textContent = '-:--'; });
  showToast('↩', 'ANULADO', '', 'Listo para nueva pasada', 'normal');
  speak('Reiniciado. Listo para comenzar.', true);
};

// ── SHARE ──
window.shareResult = function () {
  if (S.splits.length === 0) return;
  const total = S.splits[S.splits.length - 1].elapsed;
  const fecha = new Date().toLocaleString('es-CL', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
  let txt = `🏁 *STAGE CRONO · Stage ${CT.meta.stage} — ${CT.meta.nombre.toUpperCase()}*\n`;
  if (_nombre) txt += `👤 *${_nombre}*\n`;
  txt += `⏱ *Tiempo total: ${fmt(total)}*\n📅 ${fecha}\n\n`;
  S.splits.forEach((s, i) => {
    const wp = CT.waypoints[s.wpIdx];
    const isLast = i === S.splits.length - 1;
    txt += `${isLast ? '🏆' : '📍'} ${wp.name}: *${fmtS(s.lap)}* (acum ${fmtS(s.elapsed)})\n`;
  });
  const total2 = GravitasSession.getTotal();
  if (total2) {
    const t1 = GravitasSession.getTime(1); const t2 = GravitasSession.getTime(2);
    txt += `\n🏆 *Campeonato: ${fmt(total2)}*\n🟢 S1: ${fmt(t1.ms)} · 🟠 S2: ${fmt(t2.ms)}\n`;
  }
  txt += `\n_Stage Crono · Gravitas Solutions_`;
  if (navigator.share) navigator.share({ title: `Stage Crono S${CT.meta.stage}`, text: txt }).catch(() => {});
  else navigator.clipboard.writeText(txt).then(() => alert('Copiado al portapapeles'));
};

// ── SPLASH CANVAS ──
(function () {
  const c = document.getElementById('splash-canvas');
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const lats = CT.track.map(p => p[0]), lons = CT.track.map(p => p[1]);
  const mnLat = Math.min(...lats), mxLat = Math.max(...lats), mnLon = Math.min(...lons), mxLon = Math.max(...lons);
  const pad = 0.12;
  function tx(lon) { return pad * c.width + (lon - mnLon) / (mxLon - mnLon) * c.width * (1 - pad * 2); }
  function ty(lat) { return pad * c.height + (1 - (lat - mnLat) / (mxLat - mnLat)) * c.height * (1 - pad * 2); }
  let prog = 0;
  function draw() {
    if (document.getElementById('splash').classList.contains('hidden')) return;
    const W = c.width, H = c.height, ctx = c.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < 10; i++) { ctx.beginPath(); ctx.moveTo(0, H * .05 + i * H * .1); ctx.lineTo(W, H * .05 + i * H * .1); ctx.strokeStyle = `rgba(0,255,65,.018)`; ctx.lineWidth = 1; ctx.stroke(); }
    ctx.beginPath(); CT.track.forEach(([la, lo], i) => { const x = tx(lo), y = ty(la); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }); ctx.strokeStyle = 'rgba(0,255,65,.07)'; ctx.lineWidth = 14; ctx.filter = 'blur(8px)'; ctx.stroke(); ctx.filter = 'none';
    ctx.beginPath(); CT.track.forEach(([la, lo], i) => { const x = tx(lo), y = ty(la); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }); ctx.strokeStyle = _accentColor; ctx.lineWidth = 1.5; ctx.globalAlpha = .45; ctx.stroke(); ctx.globalAlpha = 1;
    CT.waypoints.forEach(wp => { ctx.beginPath(); ctx.arc(tx(wp.lon), ty(wp.lat), 3.5, 0, Math.PI * 2); ctx.fillStyle = wp.type === 'start' ? 'rgba(0,255,65,.8)' : wp.type === 'finish' ? 'rgba(255,214,0,.7)' : 'rgba(255,107,0,.6)'; ctx.fill(); });
    prog = (prog + .004) % 1;
    const [la, lo] = CT.track[Math.floor(prog * CT.track.length)];
    const px = tx(lo), py = ty(la);
    ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,255,65,.1)'; ctx.fill();
    ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2); ctx.fillStyle = _accentColor; ctx.fill();
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(e => console.log(e)); }); }
</script>
